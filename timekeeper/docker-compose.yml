services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: timekeeper
      POSTGRES_PASSWORD: timekeeper
      POSTGRES_DB: timekeeper
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timekeeper"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://timekeeper:timekeeper@postgres:5432/timekeeper
      PORT: "3000"
      CORS_ORIGIN: "http://localhost:3000"
      MCP_BEARER_TOKENS: "demo-token-admin:1,demo-token-member:2"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
